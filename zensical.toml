[project]
site_name = "PyMdown Mahjong"
site_description = """
  Python Markdown extension to render Mahjong tiles and hands.
"""
site_author = "Tyler Nguyen"
repo_url = "https://github.com/tylernguyen/pymdownx-mahjong"
repo_name = "tylernguyen/pymdownx-mahjong"
edit_uri = "edit/main/docs/"

NAV = [
    {"README" = "index.md" },
    "examples.md",
    "changelog.md",
    "license.md",
]

extra_css = [
    "stylesheets/mahjong.css",
    "stylesheets/simpleicons.css",
]

features = [
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "navigation.expand",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.prune",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
repo = "simple/refinedgithub"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/lightbulb-night-outline"
toggle.name = "Automatic Mode Enabled. Click to Toggle Light Mode."
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/lightbulb-outline"
toggle.name = "Light Mode Enabled. Click to Toggle Dark Mode."
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/lightbulb-auto-outline"
toggle.name = "Dark Mode Enabled. Click to Toggle Automatic Mode."

[project.markdown_extensions.pymdownx_mahjong]
theme = "auto"
closed_kan_style = "outer"
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mahjong", class = "mahjong", format = "pymdownx_mahjong.superfences_formatter" }
]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink =  true
[project.markdown_extensions.pymdownx.quotes]
callouts = true
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options.custom_icons = ["overrides/.icons"]
[project.markdown_extensions.pymdownx.snippets]
url_download= true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
